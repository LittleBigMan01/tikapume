{% extends 'includes/base_admin.html' %}

{% block title %}Assign Leave Balance - TikaPume{% endblock %}

{% block content %}
<a href="{% url 'manage_balances' %}" class="back-link">← Back to Balances</a>

<div class="page-header">
    <h2>📅 Assign Balance</h2>
</div>

<div class="form-card" style="max-width:500px;">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Employee</label>
            <select name="user" required>
                <option value="">-- Select Employee --</option>
                {% for emp in employees %}
                    <option value="{{ emp.id }}">
                        {{ emp.get_full_name }}
                        ({{ emp.grade.name|default:"No grade" }})
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Leave Type</label>
            <select name="leave_type" required>
                <option value="">-- Select Leave Type --</option>
                {% for lt in leave_types %}
                    <option value="{{ lt.id }}">{{ lt.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Total Days</label>
            <input type="number" name="total_days"
            placeholder="Enter number of days" min="1" required>
        </div>
        <div class="form-group">
            <label>Year</label>
            <input type="number" name="year"
            value="{{ current_year }}" min="2020" required>
        </div>
        <button type="submit" class="btn-gold" style="width:100%; padding:11px;">
            ✅ Assign Balance
        </button>
    </form>
</div>
{% endblock %}
