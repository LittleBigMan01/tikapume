{% extends 'includes/base_admin.html' %}

{% block title %}Edit Grade - TikaPume{% endblock %}

{% block content %}
<div class="page-header">
    <h2>🎓 Edit Grade</h2>
    <a href="{% url 'manage_grades' %}" class="btn-gold">← Back to Grades</a>
</div>

<div class="form-card" style="max-width:500px;">
    <h2>Edit Grade Details</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Grade Name</label>
            <input type="text" name="name"
            value="{{ grade.name }}" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description">{{ grade.description }}</textarea>
        </div>
        <button type="submit" class="btn-gold"
        style="width:100%; padding:12px; font-size:15px;">
            ✅ Update Grade
        </button>
    </form>
</div>
{% endblock %}
