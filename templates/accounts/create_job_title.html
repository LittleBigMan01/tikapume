{% extends 'includes/base_admin.html' %}

{% block title %}Create Job Title - TikaPume{% endblock %}

{% block content %}
<a href="{% url 'manage_job_titles' %}" class="back-link">← Back to Job Titles</a>

<div class="page-header">
    <h2>💼 Create Job Title</h2>
</div>

<div class="form-card" style="max-width:500px;">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Job Title</label>
            <input type="text" name="name"
            placeholder="Enter job title" required>
        </div>
        <div class="form-group">
            <label>Department</label>
            <select name="department">
                <option value="">-- None --</option>
                {% for dept in departments %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn-gold" style="width:100%; padding:11px;">
            + Add Job Title
        </button>
    </form>
</div>
{% endblock %}
