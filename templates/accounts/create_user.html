{% extends 'includes/base_admin.html' %}

{% block title %}Create User - TikaPume{% endblock %}

{% block content %}
<div class="page-header">
    <h2>👤 Create New User</h2>
    <a href="{% url 'manage_users' %}" class="btn-gold">← Back to Users</a>
</div>

<div class="form-card" style="max-width:700px;">
    <h2>Fill in user details below</h2>

    <form method="POST">
        {% csrf_token %}
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name"
                placeholder="Enter first name" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name"
                placeholder="Enter last name" required>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username"
                placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email"
                placeholder="Enter email address" required>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label>Password</label>
                <div style="position:relative;">
                    <input type="password" name="password"
                    id="createPasswordField"
                    placeholder="Enter password" required
                    style="padding-right:40px;">
                    <span onclick="toggleCreatePassword()"
                    id="createEyeIcon"
                    style="position:absolute; right:12px; top:50%;
                    transform:translateY(-50%); cursor:pointer;
                    font-size:16px;">👁️</span>
                </div>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone"
                placeholder="Enter phone number">
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label>System Role</label>
                <select name="role" required>
                    <option value="">-- Select Primary Role --</option>
                    <option value="it_admin">IT Administrator</option>
                    <option value="employee">Employee</option>
                    <option value="hr">Human Resource</option>
                    <option value="approver">Approver (AD / Director)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Secondary Role <span style="color:#888;
                font-size:12px;">(Optional — for dual role users)</span></label>
                <select name="secondary_role">
                    <option value="">-- None --</option>
                    <option value="it_admin">IT Administrator</option>
                    <option value="employee">Employee</option>
                    <option value="hr">Human Resource</option>
                    <option value="approver">Approver (AD / Director)</option>
                </select>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label>Grade</label>
                <select name="grade" required>
                    <option value="">-- Select Grade --</option>
                    {% for grade in grades %}
                        <option value="{{ grade.id }}">{{ grade.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Job Title</label>
                <select name="job_title">
                    <option value="">-- Select Job Title --</option>
                    {% for jt in job_titles %}
                        <option value="{{ jt.id }}">{{ jt.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Department</label>
            <select name="department">
                <option value="">-- Select Department --</option>
                {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Is Supervisor?</label>
            <div style="display:flex; align-items:center; gap:10px;
            padding:10px 14px; border:1.5px solid #add;
            border-radius:8px; background:white;">

            <input type="checkbox" name="is_supervisor" id="is_supervisor" style="width:18px; height:18px;
            accent-color: #DAA520; cursor:pointer;">

            <label for = "is_supervisor" style=""cursor:pointer;
            font-size:14px; color:#333; margin:0;>
            This User is a Supervisor

            <span style = "color:#888; font-size:12px;">
                (can review team leave requests)</span>
            </label>
            </div>
        </div>

        <button type="submit" class="btn-gold"
        style="width:100%; padding:12px; font-size:15px; margin-top:8px;">
            ✅ Create User Account
        </button>
    </form>
</div>

{% endblock %}

{% block extra_js %}
<script>
function toggleCreatePassword() {
    const field = document.getElementById('createPasswordField');
    const icon = document.getElementById('createEyeIcon');
    if (field.type === 'password') {
        field.type = 'text';
        icon.textContent = '🙈';
    } else {
        field.type = 'password';
        icon.textContent = '👁️';
    }
}
</script>
{% endblock %}
